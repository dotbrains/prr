<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Logo symbol (code review icon: document with checkmark) -->
  <g transform="translate(100, 200)">
    <rect width="100" height="100" rx="20" fill="url(#logoGradient)"/>
    <g transform="translate(50, 50)" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Document outline -->
      <path d="M -18,-24 L 10,-24 L 22,-12 L 22,24 L -18,24 Z" />
      <!-- Page fold -->
      <path d="M 10,-24 L 10,-12 L 22,-12" />
      <!-- Checkmark -->
      <path d="M -8,4 L -2,10 L 10,-4" stroke-width="4" />
    </g>
  </g>

  <!-- Main heading -->
  <text x="240" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    prr
  </text>

  <!-- Subtitle -->
  <text x="240" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="400" fill="#94a3b8" letter-spacing="0">
    AI code reviews, one command.
  </text>

  <!-- Feature highlights -->
  <g transform="translate(240, 360)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">
      Claude AI
    </text>

    <!-- Badge 2 -->
    <rect x="175" y="0" width="160" height="40" rx="20" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
    <text x="255" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#d97706" text-anchor="middle">
      GPT-4
    </text>

    <!-- Badge 3 -->
    <rect x="0" y="55" width="160" height="40" rx="20" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="80" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#fbbf24" text-anchor="middle">
      GitHub PRs
    </text>

    <!-- Badge 4 -->
    <rect x="175" y="55" width="160" height="40" rx="20" fill="#1e293b" stroke="#fde68a" stroke-width="1.5"/>
    <text x="255" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#fde68a" text-anchor="middle">
      Local Diffs
    </text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(700, 160)">
    <rect width="400" height="280" rx="12" fill="#0f1117" stroke="#2d3748" stroke-width="2"/>

    <!-- Code header -->
    <rect width="400" height="40" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Code content -->
    <text x="20" y="75" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#f59e0b" font-weight="500">$ prr 17509</text>
    <text x="20" y="105" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Fetching PR #17509...</text>
    <text x="20" y="130" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Analyzing with Claude...</text>
    <text x="20" y="155" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ 12 comments generated</text>

    <text x="20" y="195" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#f59e0b" font-weight="500">$ prr --base main</text>
    <text x="20" y="225" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Diffing main..feature-auth</text>
    <text x="20" y="250" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ Review complete.</text>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
